name: Aurelia — Auditor GHL Diario

on:
  schedule:
    # Cada hora de 07:00 a 18:00 Argentina (GMT-3)
    # Adelantado 1 hora para compensar desfasaje de GitHub Actions
    # ARG 07:00 = UTC 10:00 → cron a las 09:00 UTC
    - cron: '0 9 * * *'
    # ARG 08:00 = UTC 11:00 → cron a las 10:00 UTC
    - cron: '0 10 * * *'
    # ARG 09:00 = UTC 12:00 → cron a las 11:00 UTC
    - cron: '0 11 * * *'
    # ARG 10:00 = UTC 13:00 → cron a las 12:00 UTC
    - cron: '0 12 * * *'
    # ARG 11:00 = UTC 14:00 → cron a las 13:00 UTC
    - cron: '0 13 * * *'
    # ARG 12:00 = UTC 15:00 → cron a las 14:00 UTC
    - cron: '0 14 * * *'
    # ARG 13:00 = UTC 16:00 → cron a las 15:00 UTC
    - cron: '0 15 * * *'
    # ARG 14:00 = UTC 17:00 → cron a las 16:00 UTC
    - cron: '0 16 * * *'
    # ARG 15:00 = UTC 18:00 → cron a las 17:00 UTC
    - cron: '0 17 * * *'
    # ARG 16:00 = UTC 19:00 → cron a las 18:00 UTC
    - cron: '0 18 * * *'
    # ARG 17:00 = UTC 20:00 → cron a las 19:00 UTC
    - cron: '0 19 * * *'
    # ARG 18:00 = UTC 21:00 → cron a las 20:00 UTC
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      cliente:
        description: 'Cliente a auditar (dejar vacío para todos)'
        required: false
        default: ''
      periodo:
        description: 'Período en horas a auditar (default: 24)'
        required: false
        default: '24'
      contact_id:
        description: 'Contact ID específico para testear (opcional)'
        required: false
        default: ''

jobs:
  auditar:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GHL_APIKEY_ICS: ${{ secrets.GHL_APIKEY_ICS }}
      GHL_LOCID_ICS: ${{ secrets.GHL_LOCID_ICS }}
      GHL_APIKEY_NOBIS: ${{ secrets.GHL_APIKEY_NOBIS }}
      GHL_LOCID_NOBIS: ${{ secrets.GHL_LOCID_NOBIS }}
      GHL_APIKEY_SISTCARGAS: ${{ secrets.GHL_APIKEY_SISTCARGAS }}
      GHL_LOCID_SISTCARGAS: ${{ secrets.GHL_LOCID_SISTCARGAS }}
      GHL_APIKEY_ALAMBRADOS: ${{ secrets.GHL_APIKEY_ALAMBRADOS }}
      GHL_LOCID_ALAMBRADOS: ${{ secrets.GHL_LOCID_ALAMBRADOS }}
      GHL_APIKEY_MDK: ${{ secrets.GHL_APIKEY_MDK }}
      GHL_LOCID_MDK: ${{ secrets.GHL_LOCID_MDK }}
      GHL_APIKEY_AGROUP: ${{ secrets.GHL_APIKEY_AGROUP }}
      GHL_LOCID_AGROUP: ${{ secrets.GHL_LOCID_AGROUP }}
      DISCORD_WEBHOOK_AURELIA: ${{ secrets.DISCORD_WEBHOOK_AURELIA }}

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar auditoría
        run: node auditor.js
        env:
          CLIENTE_FILTRO: ${{ github.event.inputs.cliente }}
          PERIODO_HORAS: ${{ github.event.inputs.periodo || '24' }}
          CONTACT_ID_TEST: ${{ github.event.inputs.contact_id }}
