name: Aurelia — Auditor GHL Diario

on:
  schedule:
    # 9:00 AM Argentina (GMT-3) = 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      cliente:
        description: 'Cliente a auditar (dejá vacío para auditar todos)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - rame
          - ics
          - nobis
          - sistcargas
          - alambrados
      periodo_horas:
        description: 'Horas hacia atrás a auditar (por defecto 24)'
        required: false
        default: '24'

jobs:
  auditar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install axios

      - name: Ejecutar Auditor GHL
        env:
          # API Keys GHL por cliente
          GHL_APIKEY_RAME: ${{ secrets.GHL_APIKEY_RAME }}
          GHL_APIKEY_ICS: ${{ secrets.GHL_APIKEY_ICS }}
          GHL_APIKEY_NOBIS: ${{ secrets.GHL_APIKEY_NOBIS }}
          GHL_APIKEY_SISTCARGAS: ${{ secrets.GHL_APIKEY_SISTCARGAS }}
          GHL_APIKEY_ALAMBRADOS: ${{ secrets.GHL_APIKEY_ALAMBRADOS }}
          # Location IDs GHL por cliente
          GHL_LOCID_RAME: ${{ secrets.GHL_LOCID_RAME }}
          GHL_LOCID_ICS: ${{ secrets.GHL_LOCID_ICS }}
          GHL_LOCID_NOBIS: ${{ secrets.GHL_LOCID_NOBIS }}
          GHL_LOCID_SISTCARGAS: ${{ secrets.GHL_LOCID_SISTCARGAS }}
          GHL_LOCID_ALAMBRADOS: ${{ secrets.GHL_LOCID_ALAMBRADOS }}
          # Claude API
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: 'claude-sonnet-4-6'
          # Discord
          DISCORD_WEBHOOK_AURELIA: ${{ secrets.DISCORD_WEBHOOK_AURELIA }}
          # Parámetros del workflow
          CLIENTE_FILTRO: ${{ github.event.inputs.cliente || '' }}
          PERIODO_HORAS: ${{ github.event.inputs.periodo_horas || '24' }}

        run: node auditor.js
